<!doctype html>
<!--
  ui-kit/templates/landing-portal.html
  For: portal root landings (/, /public/, /internal/).
  Hero = production home-hero__title H1 + WebGL rocket (preserved by request).
-->
<html lang="en" data-portal="{{ portal | default: 'internal' }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · Study App</title>
  <script>
    (function () {
      try {
        var v = localStorage.getItem("docs-theme-preference");
        if (v === "dark" || v === "light") document.documentElement.setAttribute("data-theme", v);
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../../../services/frontend/portal/assets_v2/runtime/{{ portal | default: 'internal' }}/entry.css">
  <link rel="icon" type="image/svg+xml" href="../../../../../../services/frontend/portal/assets_v2/favicon.svg">
</head>
<body class="docs-landing">
  <div data-component="scene-bg" aria-hidden="true"></div>

  <header data-component="topbar">
    <div class="docs-topbar__brand">{{ portal | default: 'Internal' }} docs</div>
    <div data-component="breadcrumbs" aria-label="Breadcrumb"></div>
    <div class="docs-topbar__spacer"></div>
    <div data-component="search"></div>
    <button data-component="theme-toggle" type="button"></button>
  </header>

  <main class="docs-landing__main">
    <section class="home-hero">
      <h1 class="home-hero__title">{{ page.hero.title }}</h1>
      <p class="home-hero__lede">{{ page.hero.lede }}</p>
      <div class="home-hero__rocket" data-component="rocket"></div>
      <div class="home-hero__ctas">
        <a class="docs-btn docs-btn--primary docs-btn--lg" href="{{ page.hero.primaryHref }}">{{ page.hero.primaryLabel }}</a>
        <a class="docs-btn docs-btn--ghost docs-btn--lg" href="{{ page.hero.secondaryHref }}">{{ page.hero.secondaryLabel }}</a>
      </div>
    </section>

    <section class="docs-landing__grid">
      {% for card in page.cards %}
      <a class="docs-card docs-card--interactive docs-card--gradient" href="{{ card.href }}">
        <h3 class="docs-card__title">{{ card.title }}</h3>
        <p class="docs-card__body">{{ card.body }}</p>
        <span class="docs-card__hint">{{ card.hint }} →</span>
      </a>
      {% endfor %}
    </section>
  </main>

  <footer data-component="footer-history"></footer>

  <script type="module" src="../../../../../../services/frontend/portal/assets_v2/runtime/{{ portal | default: 'internal' }}/entry.js"></script>
</body>
</html>
