<!doctype html>
<!--
  ui-kit/templates/doc-article.html
  Default doc page. Sidebar + breadcrumbs + prose + right-rail TOC + FAB on mobile.
-->
<html lang="en" data-portal="{{ portal | default: 'internal' }}" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · Study App</title>
  <script>
    (function () { try { var v = localStorage.getItem("docs-theme-preference"); if (v === "dark" || v === "light") document.documentElement.setAttribute("data-theme", v); } catch (e) {} })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../../../../services/frontend/portal/assets_v2/runtime/{{ portal | default: 'internal' }}/entry.css">
</head>
<body class="docs-article">
  <header data-component="topbar">
    <div class="docs-topbar__brand">{{ portal | default: 'Internal' }}</div>
    <div data-component="breadcrumbs" aria-label="Breadcrumb"></div>
    <div class="docs-topbar__spacer"></div>
    <div data-component="search"></div>
    <button data-component="theme-toggle" type="button"></button>
  </header>

  <aside data-component="sidebar" data-nav-src="../../../../../../services/frontend/portal/assets_v2/ui-kit/mocks/nav-tree-{{ portal | default: 'internal' }}.json"></aside>

  <main class="docs-prose">
    <article>
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}<p class="docs-prose__lede">{{ page.subtitle }}</p>{% endif %}
      {{ page.content }}
    </article>
    <footer data-component="footer-history"></footer>
  </main>

  <aside data-component="toc" aria-label="On this page"></aside>
  <button data-component="toc-fab" aria-label="Open on this page"></button>
  <button data-component="drawer-trigger" aria-label="Open navigation"></button>

  <script type="module" src="../../../../../../services/frontend/portal/assets_v2/runtime/{{ portal | default: 'internal' }}/entry.js"></script>
</body>
</html>
