<!doctype html>
<!--
  ui-kit/templates/_page-base.html — base skeleton both portals extend.
  Set data-portal to "public" or "internal" on <html>.
  Pick the matching entry.css.
-->
<html lang="en" data-portal="internal" data-theme="light" data-h1-deep="1">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} · Study App</title>

  <!-- No-flash theme bootstrap -->
  <script>
    (function () {
      try {
        var v = localStorage.getItem("docs-theme-preference");
        if (v === "dark" || v === "light") document.documentElement.setAttribute("data-theme", v);
      } catch (e) { /* ignore */ }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..900&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap" rel="stylesheet">

  <!-- Single CSS entry. Swap to /assets_v2/runtime/public/entry.css for public pages. -->
  <link rel="stylesheet" href="../../../../../../services/frontend/portal/assets_v2/runtime/internal/entry.css">
  <link rel="icon" type="image/svg+xml" href="../../../../../../services/frontend/portal/assets_v2/favicon.svg">
</head>
<body>
  <!-- topbar slot -->
  <header data-component="topbar"></header>

  <!-- sidebar slot (data-driven from nav-tree-<portal>.json) -->
  <aside data-component="sidebar" data-nav-src="../../../../../../services/frontend/portal/assets_v2/ui-kit/mocks/nav-tree-internal.json"></aside>

  <!-- main -->
  <main>
    <nav data-component="breadcrumbs" aria-label="Breadcrumb"></nav>

    <!-- content block -->
    {{ page.content }}

    <footer data-component="footer-history"></footer>
  </main>

  <!-- right-side TOC + mobile FAB -->
  <aside data-component="toc"></aside>
  <button data-component="toc-fab" aria-label="Open on this page"></button>

  <!-- mobile drawer trigger -->
  <button data-component="drawer-trigger" aria-label="Open navigation"></button>

  <!-- single JS entry -->
  <script type="module" src="../../../../../../services/frontend/portal/assets_v2/runtime/internal/entry.js"></script>
</body>
</html>
