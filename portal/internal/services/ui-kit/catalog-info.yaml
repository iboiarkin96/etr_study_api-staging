apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ui-kit
  title: ui-kit
  description: Tokens, components, per-portal runtime bundles, templates with component annotation
  annotations:
    backstage.io/source-location: services/frontend/portal/assets_v2/
    backstage.io/last-reviewed: "2026-05-17"
  tags:
    - design-system
    - vanilla-css
    - vanilla-js
spec:
  type: library
  lifecycle: stable
  owner: user:ivan-boyarkin
  dependsOn: []

x-study-app:
  tone: success
  display-order: 40
  lede: >-
    Shared design system for both the public marketing site and the internal
    docs portal. Authoritative source for tokens, components, runtime bundles,
    and templates.
  tile-lede: >-
    Shared design system that powers both this portal and the public site.
  tile-stack: "CSS tokens · Vanilla JS modules · Static showcase"
  header-pills:
    - { text: Design system, tone: info }
    - { text: Catalog entry, tone: neutral }
  source-display: services/frontend/portal/assets_v2/
  dependencies:
    - label: Styling
      chips:
        - { name: Vanilla CSS, icon: palette, status: current, hint: tokens }
    - label: Behaviour
      chips:
        - { name: Vanilla JS, icon: braces, status: current, hint: esm }
    - label: Typography
      chips:
        - { name: Inter, icon: font, status: current }
        - { name: JetBrains Mono, icon: font, status: current }
