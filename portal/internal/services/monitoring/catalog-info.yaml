apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: monitoring
  title: monitoring
  description: Canonical three-pillar observability stack (metrics + logs + dashboards)
  annotations:
    backstage.io/source-location: services/monitoring/
    backstage.io/last-reviewed: "2026-05-17"
  tags:
    - prometheus
    - grafana
    - elk
spec:
  type: service
  lifecycle: experimental
  owner: user:ivan-boyarkin
  dependsOn:
    - component:api

x-study-app:
  tone: warning
  display-order: 30
  lede: >-
    Prometheus is for metrics. Grafana is for dashboards on top of Prometheus.
    Elastic (ELK) is using for full-text search in logs.
  tile-lede: >-
    App observability by Prometheus+Grafana. Search by Elasticsearch + Kibana
    + Filebeat.
  tile-stack: "Prometheus · Grafana · Filebeat · Elasticsearch · Kibana"
  header-pills:
    - { text: Prometheus / Grafana, tone: info }
    - { text: Optional log pipeline, tone: neutral }
  dependencies:
    - label: Scrape target
      chips:
        - { name: api, icon: scrape, status: current, hint: ":8000/metrics" }
    - label: Logs
      chips:
        - { name: Elasticsearch, icon: cylinder, status: current, hint: store }
        - { name: Kibana, icon: grid, status: current, hint: ui }
        - { name: Filebeat, icon: file, status: current, hint: shipper }
    - label: Runtime
      chips:
        - { name: Compose images, icon: containers, status: current }
