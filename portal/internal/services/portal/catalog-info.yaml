apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: portal
  title: portal
  description: Full project docs for users
  annotations:
    backstage.io/source-location: services/portal/
    backstage.io/last-reviewed: "2026-05-17"
  tags:
    - nginx-alpine
    - static-site
  links:
    - url: ../../index.html
      title: Internal hub
      type: links
spec:
  type: website
  lifecycle: stable
  owner: user:ivan-boyarkin
  dependsOn: []

x-study-app:
  tone: accent
  display-order: 20
  lede: >-
    Places for documentation storage. Implement targeted audience split:
    separate portals for public and internal docs.
  tile-lede: >-
    Static documentation site (this site). Built at CI time from HTML +
    PlantUML + pdoc.
  tile-stack: "nginx-alpine · Python build · PlantUML / Kroki · pdoc"
  header-pills:
    - { text: nginx-alpine, tone: info }
    - { text: Static site, tone: neutral }
  dependencies:
    - label: Build-time
      chips:
        - { name: Python, icon: python, status: current }
        - { name: PlantUML, icon: plantuml, status: current }
        - { name: Kroki, icon: plantuml, status: current }
        - { name: pdoc, icon: pdoc, status: current }
    - label: Runtime
      chips:
        - { name: nginx-alpine, icon: nginx, status: current }
